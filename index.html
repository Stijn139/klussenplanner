<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klusplanner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(170deg,#1a1a2e 0%,#16213e 40%,#1a1a2e 100%);color:#E8E4DF;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.header{padding:28px 32px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;background:linear-gradient(135deg,#F0C27F,#D4763C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.subtitle{margin-top:4px;font-size:13px;color:#8B8A8A;font-weight:300}
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:8px;vertical-align:middle}
.sync-dot.ok{background:#6BA368}.sync-dot.loading{background:#E8A94A;animation:pulse 1s infinite}.sync-dot.error{background:#E85D4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pbar{display:inline-block;margin-left:12px;width:100px;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);position:relative;vertical-align:middle}
.pfill{position:absolute;left:0;top:0;height:4px;border-radius:2px;background:linear-gradient(90deg,#D4763C,#F0C27F);transition:width 0.4s}
.nav-btns{display:flex;gap:6px;align-items:center}
.nav-btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(255,255,255,0.04);color:#8B8A8A;transition:all 0.2s}
.nav-btn.active{background:rgba(212,118,60,0.2);color:#F0C27F}
.nav-btn:hover,.fs-btn:hover{background:rgba(255,255,255,0.08)}
.fs-btn{padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-size:16px;font-family:inherit;background:rgba(255,255,255,0.04);color:#8B8A8A;margin-left:4px}
.main{padding:24px 32px;max-width:1100px;margin:0 auto}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit;background:transparent;color:#666;transition:all 0.15s}
.fbtn.active{background:rgba(255,255,255,0.1);color:#E8E4DF}
.btn-p{padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:linear-gradient(135deg,#D4763C,#E8A94A);color:#1a1a2e}
.btn-p:hover{transform:scale(1.02)}
.btn-cal{padding:7px 16px;border-radius:8px;border:1px solid rgba(91,123,178,0.3);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(91,123,178,0.08);color:#7BA3D4;display:inline-flex;align-items:center;gap:6px}
.btn-cal:hover{background:rgba(91,123,178,0.15)}
.btn-sm{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;transition:all 0.15s}
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){.kanban{grid-template-columns:1fr}}
.kcol{background:rgba(255,255,255,0.02);border-radius:14px;padding:16px;min-height:200px;border:1px solid rgba(255,255,255,0.04);transition:all 0.2s}
.kcol.drag-over{border-color:rgba(240,194,127,0.4);background:rgba(212,118,60,0.05)}
.ch{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.tc{padding:12px 14px;margin-bottom:8px;border-radius:10px;cursor:grab;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);transition:all 0.2s;user-select:none}
.tc:hover{background:rgba(255,255,255,0.06)}.tc.done-card{opacity:0.5}.tc.dragging{opacity:0.4;transform:scale(0.95)}
.tc-inner{display:flex;align-items:flex-start;gap:10px}
.status-btn{background:none;border:none;cursor:pointer;padding:4px;font-size:16px;line-height:1;border-radius:4px}
.status-btn:hover{transform:scale(1.3);background:rgba(255,255,255,0.08)}
.tc-title{font-size:13px;font-weight:500}.tc-title.done-text{text-decoration:line-through;color:#777}
.tc-meta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.prio-tag{font-size:10px;padding:1px 7px;border-radius:4px}
.proj-tag{font-size:10px;padding:1px 7px;border-radius:4px;border:1px solid}
.stitle{font-family:'Playfair Display',serif;font-weight:700;color:#D4C4B0}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.pcard{background:rgba(255,255,255,0.03);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.pcard:hover{filter:brightness(1.1)}
.pacc{width:4px;height:100%;position:absolute;left:0;top:0;border-radius:14px 0 0 14px}
.addcard{background:rgba(255,255,255,0.02);border-radius:14px;padding:20px;border:1px dashed rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;font-size:14px;min-height:100px}
.addcard:hover{border-color:rgba(255,255,255,0.2)}
/* Subproject sections */
.sp-section{margin-bottom:20px;border:1px solid rgba(255,255,255,0.04);border-radius:14px;overflow:hidden}
.sp-header{display:flex;align-items:center;gap:10px;padding:14px 18px;background:rgba(255,255,255,0.02);cursor:pointer;user-select:none;transition:background 0.15s}
.sp-header:hover{background:rgba(255,255,255,0.04)}
.sp-toggle{font-size:12px;color:#888;transition:transform 0.2s;display:inline-block}
.sp-toggle.open{transform:rotate(90deg)}
.sp-body{padding:0 16px 16px}
.sp-body.collapsed{display:none}
.sp-progress{flex:1;max-width:80px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-left:auto}
.sp-progress-fill{height:3px;border-radius:2px;transition:width 0.3s}
.sp-actions{display:flex;gap:6px;margin-left:8px}
/* Unassigned section in project */
.unassigned-section{margin-bottom:20px}
.unassigned-header{font-size:14px;color:#888;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
/* Timeline */
.trow{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04);margin-bottom:8px}
.trow:hover{background:rgba(255,255,255,0.04)}
.ics-btn{background:none;border:none;cursor:pointer;padding:4px 6px;font-size:14px;opacity:0.4;border-radius:4px}
.ics-btn:hover{opacity:1;background:rgba(255,255,255,0.06)}
.chip{font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,0.03);color:#888;border:1px solid rgba(255,255,255,0.05)}
.chip:hover{background:rgba(255,255,255,0.06)}
.tag{font-size:11px;padding:3px 10px;border-radius:6px;background:rgba(255,255,255,0.04);color:#AAA;display:inline-block;margin:2px 4px 2px 0}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#1e2340;border-radius:18px;padding:28px;width:100%;max-width:460px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 60px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px;font-family:'Playfair Display',serif;color:#D4C4B0}
.modal label{font-size:12px;color:#888;display:block;margin-bottom:6px;font-weight:500}
.mi{width:100%;padding:10px 14px;border-radius:10px;font-size:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E8E4DF;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:14px;color-scheme:dark;box-sizing:border-box}
textarea.mi{resize:vertical}
/* Custom select */
.csel{position:relative;margin-bottom:14px}
.csel-btn{width:100%;padding:10px 14px;border-radius:10px;font-size:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E8E4DF;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between}
.csel-btn:hover{border-color:rgba(255,255,255,0.15)}
.csel-btn::after{content:'▾';color:#666;font-size:12px}
.csel-drop{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#252a4a;border:1px solid rgba(255,255,255,0.1);border-radius:10px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none}
.csel-drop.open{display:block}
.csel-opt{padding:9px 14px;cursor:pointer;font-size:13px;color:#CCC;transition:background 0.1s}
.csel-opt:first-child{border-radius:10px 10px 0 0}
.csel-opt:last-child{border-radius:0 0 10px 10px}
.csel-opt:hover{background:rgba(255,255,255,0.06)}
.csel-opt.active{background:rgba(212,118,60,0.15);color:#F0C27F}
/* Custom date picker */
.cdp{position:relative;margin-bottom:14px}
.cdp-btn{width:100%;padding:10px 14px;border-radius:10px;font-size:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E8E4DF;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between}
.cdp-btn:hover{border-color:rgba(255,255,255,0.15)}
.cdp-btn .placeholder{color:#666}
.cdp-panel{position:absolute;top:100%;left:0;margin-top:4px;background:#252a4a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none;min-width:280px}
.cdp-panel.open{display:block}
.cdp-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cdp-nav button{background:none;border:none;color:#AAA;cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px}
.cdp-nav button:hover{background:rgba(255,255,255,0.06)}
.cdp-nav span{font-size:14px;font-weight:600;color:#D4C4B0}
.cdp-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.cdp-weekdays span{text-align:center;font-size:11px;color:#666;font-weight:500;padding:4px 0}
.cdp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdp-day{text-align:center;padding:7px 0;font-size:13px;color:#AAA;cursor:pointer;border-radius:8px;transition:all 0.1s}
.cdp-day:hover{background:rgba(255,255,255,0.06)}
.cdp-day.other{color:#444}
.cdp-day.today{color:#F0C27F;font-weight:600}
.cdp-day.selected{background:rgba(212,118,60,0.25);color:#F0C27F;font-weight:600}
.cdp-day.empty{cursor:default}
.cdp-actions{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06)}
.cdp-actions button{background:none;border:none;font-size:12px;font-family:inherit;cursor:pointer;padding:4px 8px;border-radius:6px}
.cdp-actions button:first-child{color:#E85D4A}.cdp-actions button:last-child{color:#7BA3D4}
.cdp-actions button:hover{background:rgba(255,255,255,0.06)}
/* Custom time picker */
.ctp{position:relative;margin-bottom:14px}
.ctp-btn{width:100%;padding:10px 14px;border-radius:10px;font-size:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E8E4DF;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between}
.ctp-btn:hover{border-color:rgba(255,255,255,0.15)}
.ctp-btn .placeholder{color:#666}
.ctp-panel{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#252a4a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:0;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none;max-height:280px;overflow-y:auto}
.ctp-panel.open{display:block}
.ctp-section{padding:6px 12px 2px;font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;background:#252a4a;z-index:1}
.ctp-slots{display:flex;flex-wrap:wrap;gap:4px;padding:4px 12px 8px}
.ctp-slot{padding:7px 0;text-align:center;font-size:13px;color:#AAA;cursor:pointer;border-radius:8px;transition:all 0.1s;width:calc(33.33% - 3px)}
.ctp-slot:hover{background:rgba(255,255,255,0.06)}
.ctp-slot.active{background:rgba(212,118,60,0.25);color:#F0C27F;font-weight:600}
.ctp-clear{padding:8px 12px;border-top:1px solid rgba(255,255,255,0.06);text-align:center;position:sticky;bottom:0;background:#252a4a}
.ctp-clear button{background:none;border:none;color:#E85D4A;font-size:12px;font-family:inherit;cursor:pointer;padding:4px 8px;border-radius:6px}
.ctp-clear button:hover{background:rgba(255,255,255,0.06)}
.prio-row,.status-row{display:flex;gap:8px;margin-bottom:14px}
.pbtn,.sbtn{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;background:rgba(255,255,255,0.04);color:#666;display:flex;align-items:center;justify-content:center;gap:6px}
.dt-row{display:flex;gap:12px;margin-bottom:14px}
.dt-row>div{flex:1}
.colors{display:flex;gap:8px;margin-bottom:20px}
.cdot{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.cdot.act{border-color:white}
.brow{display:flex;gap:10px;margin-top:6px}
.bsave{padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;background:linear-gradient(135deg,#D4763C,#E8A94A);color:#1a1a2e;flex:1}
.bdel{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-family:inherit;background:rgba(232,93,74,0.12);color:#E85D4A}
.bcan{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-family:inherit;background:rgba(255,255,255,0.04);color:#888}
.bcal-full{width:100%;padding:10px 0;border-radius:10px;border:1px solid rgba(66,133,244,0.3);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(66,133,244,0.08);color:#8AB4F8;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.bcal-full:hover{background:rgba(66,133,244,0.15)}
.bics-full{width:100%;padding:10px 0;border-radius:10px;border:1px solid rgba(91,123,178,0.3);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(91,123,178,0.08);color:#7BA3D4;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.bics-full:hover{background:rgba(91,123,178,0.15)}
.backbtn{background:none;border:none;color:#8B8A8A;cursor:pointer;font-size:13px;font-family:inherit;padding:0;margin-bottom:16px}
.backbtn:hover{color:#E8E4DF}
.reset{background:none;border:none;color:#444;font-size:11px;cursor:pointer;font-family:inherit}
.footer{text-align:center;padding:40px 0 24px}
.proj-list-card{background:rgba(255,255,255,0.03);border-radius:14px;padding:24px;cursor:pointer;position:relative;overflow:hidden;margin-bottom:14px}
.btn-danger{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:inherit;background:rgba(232,93,74,0.1);color:#E85D4A}
.empty-state{text-align:center;padding:60px;color:#555}
/* Week view */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}
@media(max-width:600px){.week-grid{grid-template-columns:repeat(2,1fr)}}
.week-day{background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04);min-height:120px;padding:10px}
.week-day.today{border-color:rgba(240,194,127,0.3)}
.week-day-header{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;margin-bottom:4px}
.week-day-num{font-size:18px;font-weight:700;color:#D4C4B0;margin-bottom:8px}
.week-day-num.today{color:#F0C27F}
.week-day-num.other-month{color:#444}
.week-task{padding:6px 8px;margin-bottom:4px;border-radius:6px;font-size:11px;cursor:pointer;border-left:3px solid;background:rgba(255,255,255,0.03);transition:background 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-task:hover{background:rgba(255,255,255,0.06)}
.week-task .wt-time{color:#7BA3D4;margin-right:4px;font-weight:500}
/* Month view */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
@media(max-width:600px){.month-grid{grid-template-columns:repeat(7,1fr);gap:2px}}
.month-cell{background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.03);min-height:80px;padding:6px;overflow:hidden}
.month-cell.today{border-color:rgba(240,194,127,0.3)}
.month-cell.other{opacity:0.3}
.month-cell-num{font-size:12px;font-weight:600;color:#888;margin-bottom:4px}
.month-cell-num.today{color:#F0C27F}
.month-task{padding:2px 5px;margin-bottom:2px;border-radius:4px;font-size:10px;cursor:pointer;border-left:2px solid;background:rgba(255,255,255,0.04);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-task:hover{background:rgba(255,255,255,0.08)}
.month-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.month-weekdays span{text-align:center;font-size:11px;color:#555;font-weight:600}
/* Plan nav */
.plan-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.plan-nav button{background:none;border:none;color:#AAA;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px}
.plan-nav button:hover{background:rgba(255,255,255,0.06)}
.plan-nav .plan-label{font-size:15px;font-weight:600;color:#D4C4B0;min-width:160px;text-align:center}
.plan-tabs{display:flex;gap:4px;margin-bottom:16px}
.plan-tab{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;background:rgba(255,255,255,0.04);color:#888;transition:all 0.15s}
.plan-tab.active{background:rgba(212,118,60,0.2);color:#F0C27F}
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;font-size:15px;color:#888;gap:10px}
.gcal-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;margin:-8px -16px 16px;border-radius:10px;background:rgba(66,133,244,0.06);border:1px solid rgba(66,133,244,0.15);font-size:12px;color:#8AB4F8}
.gcal-bar.connected{background:rgba(107,163,104,0.06);border-color:rgba(107,163,104,0.15);color:#6BA368}
.gcal-connect-btn{padding:5px 14px;border-radius:6px;border:1px solid rgba(66,133,244,0.3);cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;background:rgba(66,133,244,0.1);color:#8AB4F8;margin-left:auto}
.gcal-connect-btn:hover{background:rgba(66,133,244,0.2)}
.btn-gcal-add{width:100%;padding:10px 0;border-radius:10px;border:1px solid rgba(66,133,244,0.3);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(66,133,244,0.08);color:#8AB4F8;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gcal-add:hover{background:rgba(66,133,244,0.15)}
.btn-gcal-add:disabled{opacity:0.4;cursor:default}
/* Responsive mobile */
@media(max-width:600px){
  .header{padding:16px 16px 14px}
  .header h1{font-size:24px}
  .main{padding:16px}
  .nav-btn{padding:6px 10px;font-size:12px}
  .fs-btn{display:none}
  .toolbar{flex-direction:column;align-items:stretch;gap:10px}
  .filter-btns{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;flex-wrap:nowrap}
  .fbtn{white-space:nowrap;flex-shrink:0}

async function gcalCreateEvent(task){
  if(!gcalToken){gcalConnect();return}
  const ev={summary:"🔨 "+task.title};
  if(task.planned&&task.planned_time){
    ev.start={dateTime:task.planned+"T"+task.planned_time+":00",timeZone:"Europe/Amsterdam"};
    const[h,m]=task.planned_time.split(':').map(Number);
    const eh=String(h+1).padStart(2,'0')+":"+String(m).padStart(2,'0');
    ev.end={dateTime:task.planned+"T"+eh+":00",timeZone:"Europe/Amsterdam"};
  }else if(task.planned){
    ev.start={date:task.planned};
    const nd=new Date(task.planned+"T00:00:00");nd.setDate(nd.getDate()+1);
    const p2=n=>String(n).padStart(2,'0');
    ev.end={date:nd.getFullYear()+"-"+p2(nd.getMonth()+1)+"-"+p2(nd.getDate())};
  }else return;
  if(task.notes)ev.description=task.notes;
  try{
    const res=await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events",{
      method:"POST",
      headers:{"Authorization":"Bearer "+gcalToken,"Content-Type":"application/json"},
      body:JSON.stringify(ev)
    });

}

function mkICS(list){const p2=n=>String(n).padStart(2,'0');const toD=d=>d.replace(/-/g,'');const nxt=d=>{const dt=new Date(d+"T00:00:00");dt.setDate(dt.getDate()+1);return dt.getFullYear()+p2(dt.getMonth()+1)+p2(dt.getDate())};let s="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Klusplanner//NL\r\n";list.forEach(t=>{if(!t.planned)return;s+="BEGIN:VEVENT\r\n";if(t.planned_time){const[h,m]=t.planned_time.split(':').map(Number);s+="DTSTART;TZID=Europe/Amsterdam:"+toD(t.planned)+"T"+p2(h)+p2(m)+"00\r\n";s+="DTEND;TZID=Europe/Amsterdam:"+toD(t.planned)+"T"+p2(h+1)+p2(m)+"00\r\n"}else{s+="DTSTART;VALUE=DATE:"+toD(t.planned)+"\r\n";s+="DTEND;VALUE=DATE:"+nxt(t.planned)+"\r\n"}s+="SUMMARY:🔨 "+t.title.replace(/[,;\\]/g,' ')+"\r\n";if(t.notes)s+="DESCRIPTION:"+t.notes.replace(/\n/g,'\\n').replace(/[,;\\]/g,' ')+"\r\n";s+="UID:"+t.id+"@klusplanner\r\nEND:VEVENT\r\n"});return s+"END:VCALENDAR\r\n"}

function initDatePicker(container,value,onChange){
  const btn=container.querySelector('.cdp-btn');
  const panel=container.querySelector('.cdp-panel');
  let selected=value?new Date(value+'T00:00:00'):null;
  let viewDate=selected?new Date(selected):new Date();

  btn.addEventListener('click',e=>{e.stopPropagation();document.querySelectorAll('.csel-drop.open,.cdp-panel.open,.ctp-panel.open').forEach(d=>{if(d!==panel)d.classList.remove('open')});panel.classList.toggle('open');if(panel.classList.contains('open'))renderCal()});

  function renderCal(){
    const y=viewDate.getFullYear(),m=viewDate.getMonth();
    const months=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
    const first=new Date(y,m,1),last=new Date(y,m+1,0);
    const startDay=(first.getDay()+6)%7;// Monday=0
    const today=new Date();today.setHours(0,0,0,0);
    const p2=n=>String(n).padStart(2,'0');

    let html=`<div class="cdp-nav"><button data-dir="-1">◂</button><span>${months[m]} ${y}</span><button data-dir="1">▸</button></div>`;
    html+=`<div class="cdp-weekdays"><span>ma</span><span>di</span><span>wo</span><span>do</span><span>vr</span><span>za</span><span>zo</span></div>`;
    html+=`<div class="cdp-days">`;
    // Days from prev month
    const prevLast=new Date(y,m,0).getDate();
    for(let i=startDay-1;i>=0;i--)html+=`<div class="cdp-day other" data-d="${y}-${p2(m)}-${p2(prevLast-i)}">${prevLast-i}</div>`;
    // Current month
    for(let d=1;d<=last.getDate();d++){
      const dt=new Date(y,m,d);dt.setHours(0,0,0,0);
      const iso=y+'-'+p2(m+1)+'-'+p2(d);
      const cls=['cdp-day'];
      if(dt.getTime()===today.getTime())cls.push('today');
      if(selected&&dt.getTime()===selected.getTime())cls.push('selected');
      html+=`<div class="${cls.join(' ')}" data-d="${iso}">${d}</div>`;
    }
    // Fill remaining
    const totalCells=startDay+last.getDate();
    const remaining=totalCells%7===0?0:7-totalCells%7;
    for(let i=1;i<=remaining;i++)html+=`<div class="cdp-day other">${i}</div>`;
    html+=`</div><div class="cdp-actions"><button data-clear>Wissen</button><button data-today>Vandaag</button></div>`;
    panel.innerHTML=html;

    panel.querySelectorAll('.cdp-nav button').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();viewDate.setMonth(viewDate.getMonth()+parseInt(b.dataset.dir));renderCal()}));
    panel.querySelectorAll('.cdp-day:not(.empty):not(.other)').forEach(d=>d.addEventListener('click',e=>{
      e.stopPropagation();const iso=d.dataset.d;selected=new Date(iso+'T00:00:00');
      btn.querySelector('.cdp-text').textContent=fd(iso);btn.querySelector('.cdp-text').classList.remove('placeholder');
      panel.classList.remove('open');if(onChange)onChange(iso);
    }));
    panel.querySelector('[data-clear]')?.addEventListener('click',e=>{e.stopPropagation();selected=null;
      btn.querySelector('.cdp-text').textContent='Geen datum';btn.querySelector('.cdp-text').classList.add('placeholder');
      panel.classList.remove('open');if(onChange)onChange('');
    });
    panel.querySelector('[data-today]')?.addEventListener('click',e=>{e.stopPropagation();const t=new Date();t.setHours(0,0,0,0);selected=t;
      const p2=n=>String(n).padStart(2,'0');const iso=t.getFullYear()+'-'+p2(t.getMonth()+1)+'-'+p2(t.getDate());
      btn.querySelector('.cdp-text').textContent=fd(iso);btn.querySelector('.cdp-text').classList.remove('placeholder');
      panel.classList.remove('open');if(onChange)onChange(iso);
    });
  }

function initTimePicker(container,value,onChange){
  const btn=container.querySelector('.ctp-btn');
  const panel=container.querySelector('.ctp-panel');
  let sel=value||'';

  btn.addEventListener('click',e=>{e.stopPropagation();document.querySelectorAll('.csel-drop.open,.cdp-panel.open,.ctp-panel.open').forEach(d=>{if(d!==panel)d.classList.remove('open')});panel.classList.toggle('open')});

  const sections=[
    {label:'Ochtend',start:6,end:11},
    {label:'Middag',start:12,end:17},
    {label:'Avond',start:18,end:22}
  ];
  let html='';
  sections.forEach(sec=>{
    html+=`<div class="ctp-section">${sec.label}</div><div class="ctp-slots">`;
    for(let h=sec.start;h<=sec.end;h++){
      for(const m of['00','30']){
        const t=String(h).padStart(2,'0')+':'+m;
        html+=`<div class="ctp-slot${sel===t?' active':''}" data-t="${t}">${t}</div>`;
      }
    }
    html+=`</div>`;
  });
  html+=`<div class="ctp-clear"><button data-clear>Wissen</button></div>`;
  panel.innerHTML=html;

  panel.querySelectorAll('.ctp-slot').forEach(s=>s.addEventListener('click',e=>{
    e.stopPropagation();sel=s.dataset.t;
    panel.querySelectorAll('.ctp-slot').forEach(x=>x.classList.toggle('active',x.dataset.t===sel));
    btn.querySelector('.ctp-text').textContent=sel;btn.querySelector('.ctp-text').classList.remove('placeholder');
    panel.classList.remove('open');if(onChange)onChange(sel);
  }));
  panel.querySelector('[data-clear]')?.addEventListener('click',e=>{e.stopPropagation();sel='';
    panel.querySelectorAll('.ctp-slot').forEach(x=>x.classList.remove('active'));
    btn.querySelector('.ctp-text').textContent='Geen tijd';btn.querySelector('.ctp-text').classList.add('placeholder');
    panel.classList.remove('open');if(onChange)onChange('');
  });

  // Scroll to active slot on open
  if(sel){setTimeout(()=>{const active=panel.querySelector('.ctp-slot.active');if(active)active.scrollIntoView({block:'center',behavior:'instant'})},50)}
}

async function moveSP(spid,dir){
  const sp=subprojects.find(s=>s.id===spid);if(!sp)return;
  const siblings=projSubprojects(sp.project_id);
  const idx=siblings.findIndex(s=>s.id===spid);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=siblings.length)return;
  // Swap task_order values
  const other=siblings[newIdx];
  const tmpOrder=sp.task_order;
  sp.task_order=other.task_order;
  other.task_order=tmpOrder;
  render();
  await dbSaveSP(sp);
  await dbSaveSP(other);
}

  </div><button class="btn-p" data-action="add-task">+ Nieuwe klus</button></div><div class="kanban">`;
  for(const[k,l]of Object.entries(ST)){const c=sortTasks(ts.filter(t=>t.status===k));
    h+=`<div class="kcol" data-status="${k}"><div class="ch"><span style="font-size:16px;color:${SC[k]}">${SI[k]}</span><span style="font-size:13px;font-weight:600;color:#AAA;text-transform:uppercase;letter-spacing:0.5px">${l}</span><span style="font-size:11px;color:#555;margin-left:auto">${c.length}</span></div>${c.map(t=>rCard(t)).join('')}</div>`}
  return h+'</div>';
}

function rProjCards(){
  let h=`<h2 class="stitle" style="font-size:20px;margin-top:36px;margin-bottom:14px">Projecten</h2><div class="pgrid">`;
  projects.forEach(p=>{const pt=projTasks(p.id),d=pt.filter(t=>t.status==="done").length,tt=pt.length,pc=tt?(d/tt)*100:0;const spc=projSubprojects(p.id).length;
    h+=`<div class="pcard" style="border:1px solid ${p.color}33" data-action="open-project" data-id="${p.id}"><div class="pacc" style="background:${p.color}"></div><h3 style="margin:0;font-size:16px;font-weight:600;color:${p.color}">${esc(p.title)}</h3><p style="margin:6px 0 0;font-size:12px;color:#777">${esc(p.description)}${spc?` · ${spc} subproject${spc>1?'en':''}`:''}</p><div style="margin-top:12px;display:flex;align-items:center;gap:8px"><div style="flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px"><div style="height:3px;border-radius:2px;background:${p.color};width:${pc}%"></div></div><span style="font-size:11px;color:#666">${d}/${tt}</span></div></div>`});
  return h+`<div class="addcard" data-action="add-project">+ Nieuw project</div></div>`;
}

function rProjDet(){
  const p=projects.find(x=>x.id===SP);if(!p)return"";
  const sps=projSubprojects(p.id);
  const unassigned=projTasks(p.id).filter(t=>!t.subproject_id);
  const allPT=projTasks(p.id),doneC=allPT.filter(t=>t.status==="done").length;

  let h=`<button class="backbtn" data-action="back">← Terug</button>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap">
      <div style="width:6px;height:40px;border-radius:3px;background:${p.color}"></div>
      <div style="flex:1"><h2 class="stitle" style="font-size:24px;color:${p.color}">${esc(p.title)}</h2><p style="margin:4px 0 0;font-size:13px;color:#777">${esc(p.description)} · ${doneC}/${allPT.length} klaar</p></div>
      <div style="display:flex;gap:8px">
        <button class="btn-sm" style="background:rgba(255,255,255,0.04);color:#D4C4B0;border:1px solid rgba(255,255,255,0.1)" data-action="edit-project" data-id="${p.id}">✎ Bewerken</button>
        <button class="btn-sm" style="background:${p.color}11;color:${p.color};border:1px solid ${p.color}44" data-action="add-sp" data-id="${p.id}">+ Subproject</button>
        <button class="btn-sm" style="background:${p.color}11;color:${p.color};border:1px solid ${p.color}44" data-action="add-task-project" data-id="${p.id}">+ Taak</button>
        <button class="btn-danger" data-action="delete-project" data-id="${p.id}">Verwijder</button>
      </div>
    </div>`;

  // Render subprojects as collapsible sections with kanban inside
  sps.forEach(sp=>{
    const spt=spTasks(sp.id);const spDone=spt.filter(t=>t.status==="done").length;const spPct=spt.length?(spDone/spt.length)*100:0;
    const isOpen=!collapsed[sp.id];
    h+=`<div class="sp-section">
      <div class="sp-header" data-action="toggle-sp" data-id="${sp.id}">
        <span class="sp-toggle${isOpen?' open':''}">▶</span>
        <span style="font-size:14px;font-weight:600;color:#D4C4B0">${esc(sp.title)}</span>
        <span style="font-size:11px;color:#666">${spDone}/${spt.length}</span>
        <div class="sp-progress"><div class="sp-progress-fill" style="background:${p.color};width:${spPct}%"></div></div>
        <div class="sp-actions">
          <button class="btn-sm" style="background:rgba(255,255,255,0.04);color:#888;padding:3px 6px" data-action="move-sp-up" data-id="${sp.id}" onclick="event.stopPropagation()" title="Omhoog">▲</button>
          <button class="btn-sm" style="background:rgba(255,255,255,0.04);color:#888;padding:3px 6px" data-action="move-sp-down" data-id="${sp.id}" onclick="event.stopPropagation()" title="Omlaag">▼</button>
          <button class="btn-sm" style="background:rgba(255,255,255,0.04);color:#888" data-action="add-task-sp" data-pid="${p.id}" data-spid="${sp.id}" onclick="event.stopPropagation()">+ Taak</button>
          <button class="btn-sm" style="background:rgba(232,93,74,0.08);color:#E85D4A" data-action="delete-sp" data-id="${sp.id}" onclick="event.stopPropagation()">✕</button>
        </div>
      </div>
      <div class="sp-body${isOpen?'':' collapsed'}">
        <div class="kanban" style="margin-top:12px">`;
    for(const[k,l]of Object.entries(ST)){const c=sortTasks(spt.filter(t=>t.status===k));
      h+=`<div class="kcol" data-status="${k}"><div class="ch"><span style="font-size:14px;color:${SC[k]}">${SI[k]}</span><span style="font-size:12px;font-weight:600;color:#AAA;text-transform:uppercase;letter-spacing:0.5px">${l}</span><span style="font-size:11px;color:#555;margin-left:auto">${c.length}</span></div>${c.map(t=>rCard(t)).join('')}</div>`}
    h+=`</div></div></div>`;
  });

  // Unassigned tasks (no subproject)
  if(unassigned.length||!sps.length){
    h+=`<div class="unassigned-section" style="margin-top:${sps.length?'20':'0'}px">`;
    if(sps.length)h+=`<div class="unassigned-header">📋 Zonder subproject <span style="font-size:11px;color:#555">${unassigned.length}</span></div>`;
    h+=`<div class="kanban">`;
    for(const[k,l]of Object.entries(ST)){const c=sortTasks(unassigned.filter(t=>t.status===k));
      h+=`<div class="kcol" data-status="${k}"><div class="ch"><span style="font-size:14px;color:${SC[k]}">${SI[k]}</span><span style="font-size:12px;font-weight:600;color:#AAA;text-transform:uppercase;letter-spacing:0.5px">${l}</span><span style="font-size:11px;color:#555;margin-left:auto">${c.length}</span></div>${c.map(t=>rCard(t)).join('')}</div>`}
    h+=`</div></div>`;
  }
  return h;
}

function rProjList(){
  let h=`<div class="toolbar"><h2 class="stitle" style="font-size:22px">Projecten</h2><button class="btn-p" data-action="add-project">+ Nieuw project</button></div>`;
  projects.forEach(p=>{const pt=projTasks(p.id),d=pt.filter(t=>t.status==="done").length,tt=pt.length;const sps=projSubprojects(p.id);
    h+=`<div class="proj-list-card" style="border:1px solid ${p.color}33" data-action="open-project" data-id="${p.id}"><div class="pacc" style="background:${p.color}"></div><div style="display:flex;justify-content:space-between"><div><h3 style="margin:0;font-size:18px;font-weight:600;color:${p.color}">${esc(p.title)}</h3><p style="margin:6px 0 0;font-size:13px;color:#777">${esc(p.description)}${sps.length?` · ${sps.length} subproject${sps.length>1?'en':''}`:''}</p></div><span style="font-size:13px;color:#666">${d}/${tt} klaar</span></div>
    ${sps.length?`<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">${sps.map(s=>{const st=spTasks(s.id),sd=st.filter(t=>t.status==='done').length;return`<span class="tag" style="border-left:2px solid ${p.color}">${esc(s.title)} ${sd}/${st.length}</span>`}).join('')}</div>`:''}
    </div>`});
  return h;
}

function rTimeline(){
  const all=allFlat(),pl=all.filter(t=>t.planned&&t.status!=="done").sort((a,b)=>a.planned===b.planned?(a.planned_time||"99:99").localeCompare(b.planned_time||"99:99"):a.planned.localeCompare(b.planned));
  const unp=all.filter(t=>!t.planned&&t.status!=="done");
  const p2=n=>String(n).padStart(2,'0');
  const months=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  const days=['ma','di','wo','do','vr','za','zo'];
  const daysLong=['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'];
  const today=new Date();today.setHours(0,0,0,0);
  const todayISO=today.getFullYear()+'-'+p2(today.getMonth()+1)+'-'+p2(today.getDate());

  function tasksByDate(d){return pl.filter(t=>t.planned===d)}
  function isoDate(dt){return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate())}

  let h=`<div class="toolbar"><h2 class="stitle" style="font-size:22px">Planning</h2><div style="display:flex;gap:8px;flex-wrap:wrap">
    ${pl.length&&gcalToken?`<button class="btn-cal" style="border-color:rgba(66,133,244,0.3);background:rgba(66,133,244,0.08);color:#8AB4F8" data-action="gcal-sync-all">📅 Alles naar agenda</button>`:''}
  </div></div>
  <div class="gcal-bar${gcalToken?' connected':''}"><span>${gcalToken?'✓ Verbonden met Google Agenda':'Google Agenda niet verbonden'}</span><button class="gcal-connect-btn" data-action="${gcalToken?'gcal-disconnect':'gcal-connect'}">${gcalToken?'Loskoppelen':'Verbinden'}</button></div>
  <div class="plan-tabs">
    <button class="plan-tab${PV==='list'?' active':''}" data-pv="list">Lijst</button>
    <button class="plan-tab${PV==='week'?' active':''}" data-pv="week">Week</button>
    <button class="plan-tab${PV==='month'?' active':''}" data-pv="month">Maand</button>
  </div>`;

  // ===== LIST VIEW =====
  if(PV==='list'){
    if(!pl.length)h+=`<div class="empty-state"><p style="font-size:15px">Nog geen klussen ingepland</p></div>`;
    else{
      let lastDate='';
      pl.forEach(t=>{
        if(t.planned!==lastDate){lastDate=t.planned;h+=`<div style="font-size:12px;font-weight:600;color:#D4C4B0;margin:16px 0 6px;${t.planned===todayISO?'color:#F0C27F':''}">${fd(t.planned)}${t.planned===todayISO?' — Vandaag':''}</div>`}
        h+=rTimelineRow(t);
      });
    }
  }

  // ===== WEEK VIEW =====
  if(PV==='week'){
    const wd=new Date(planDate);const dow=(wd.getDay()+6)%7;wd.setDate(wd.getDate()-dow);// Monday
    const weekEnd=new Date(wd);weekEnd.setDate(weekEnd.getDate()+6);
    h+=`<div class="plan-nav"><button data-action="plan-prev">◂</button><span class="plan-label">${wd.getDate()} ${months[wd.getMonth()]} — ${weekEnd.getDate()} ${months[weekEnd.getMonth()]} ${weekEnd.getFullYear()}</span><button data-action="plan-next">▸</button><button data-action="plan-today" style="font-size:12px;color:#7BA3D4">Vandaag</button></div>`;
    h+=`<div class="week-grid">`;
    for(let i=0;i<7;i++){
      const d=new Date(wd);d.setDate(d.getDate()+i);
      const iso=isoDate(d);const isToday=iso===todayISO;
      const dayTasks=tasksByDate(iso);
      h+=`<div class="week-day${isToday?' today':''}">
        <div class="week-day-header">${daysLong[i]}</div>
        <div class="week-day-num${isToday?' today':''}">${d.getDate()}</div>
        ${dayTasks.map(t=>`<div class="week-task" data-action="edit" data-id="${t.id}" style="border-color:${t.pC||PC[t.priority]};color:#CCC">${t.planned_time?`<span class="wt-time">${t.planned_time}</span>`:''}${esc(t.title)}</div>`).join('')}
      </div>`;
    }
    h+=`</div>`;
  }

  // ===== MONTH VIEW =====
  if(PV==='month'){
    const y=planDate.getFullYear(),m=planDate.getMonth();
    const first=new Date(y,m,1),last=new Date(y,m+1,0);
    const startDay=(first.getDay()+6)%7;
    h+=`<div class="plan-nav"><button data-action="plan-prev">◂</button><span class="plan-label">${months[m]} ${y}</span><button data-action="plan-next">▸</button><button data-action="plan-today" style="font-size:12px;color:#7BA3D4">Vandaag</button></div>`;
    h+=`<div class="month-weekdays">${days.map(d=>`<span>${d}</span>`).join('')}</div><div class="month-grid">`;
    // Prev month padding
    const prevLast=new Date(y,m,0).getDate();
    for(let i=startDay-1;i>=0;i--){
      const d=prevLast-i;const dt=new Date(y,m-1,d);const iso=isoDate(dt);const dayTasks=tasksByDate(iso);
      h+=`<div class="month-cell other"><div class="month-cell-num">${d}</div>${dayTasks.slice(0,3).map(t=>`<div class="month-task" data-action="edit" data-id="${t.id}" style="border-color:${t.pC||PC[t.priority]}">${esc(t.title)}</div>`).join('')}${dayTasks.length>3?`<div style="font-size:9px;color:#666;padding:0 5px">+${dayTasks.length-3}</div>`:''}</div>`;
    }
    // Current month
    for(let d=1;d<=last.getDate();d++){
      const iso=y+'-'+p2(m+1)+'-'+p2(d);const isToday=iso===todayISO;const dayTasks=tasksByDate(iso);
      h+=`<div class="month-cell${isToday?' today':''}"><div class="month-cell-num${isToday?' today':''}">${d}</div>${dayTasks.slice(0,3).map(t=>`<div class="month-task" data-action="edit" data-id="${t.id}" style="border-color:${t.pC||PC[t.priority]}">${esc(t.title)}</div>`).join('')}${dayTasks.length>3?`<div style="font-size:9px;color:#666;padding:0 5px">+${dayTasks.length-3}</div>`:''}</div>`;
    }
    // Next month padding
    const totalCells=startDay+last.getDate();const rem=totalCells%7===0?0:7-totalCells%7;
    for(let i=1;i<=rem;i++){
      const dt=new Date(y,m+1,i);const iso=isoDate(dt);const dayTasks=tasksByDate(iso);
      h+=`<div class="month-cell other"><div class="month-cell-num">${i}</div>${dayTasks.slice(0,3).map(t=>`<div class="month-task" data-action="edit" data-id="${t.id}" style="border-color:${t.pC||PC[t.priority]}">${esc(t.title)}</div>`).join('')}</div>`;
    }
    h+=`</div>`;
  }

  // Unplanned always visible
  if(unp.length)h+=`<div style="margin-top:24px"><h3 style="font-size:14px;color:#666;font-weight:500;margin-bottom:12px">Nog niet ingepland</h3><div style="display:flex;flex-wrap:wrap;gap:8px">${unp.map(t=>`<span class="chip" data-action="edit" data-id="${t.id}">${esc(t.title)}</span>`).join('')}</div></div>`;
  return h;
}

function rTimelineRow(t){
  return`<div class="trow" data-action="edit" data-id="${t.id}" style="cursor:pointer">
    ${t.planned_time?`<span style="font-size:12px;font-weight:600;color:#7BA3D4;min-width:50px">${t.planned_time}</span>`:`<span style="font-size:12px;color:#555;min-width:50px">hele dag</span>`}
    <span style="width:3px;height:24px;border-radius:2px;background:${t.pC||PC[t.priority]}"></span>
    <div style="flex:1"><span style="font-size:14px">${esc(t.title)}</span>${t.pT?`<span style="font-size:11px;color:${t.pC};margin-left:8px">${esc(t.pT)}</span>`:''}${t.spT?`<span style="font-size:10px;color:#777;margin-left:4px">/ ${esc(t.spT)}</span>`:''}</div>
    <span class="prio-tag" style="background:${PC[t.priority]}18;color:${PC[t.priority]}">${PR[t.priority]}</span>
    <span style="font-size:14px;color:${SC[t.status]}">${SI[t.status]}</span>
    ${t.assignee?`<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:${t.assignee==='Stijn'?'rgba(91,123,178,0.15)':'rgba(197,91,122,0.15)'};color:${t.assignee==='Stijn'?'#8AB4F8':'#E091AB'}">${t.assignee}</span>`:''}
    <button class="ics-btn" data-action="gcal-add" data-id="${t.id}" title="Naar Google Agenda" onclick="event.stopPropagation()" ${!gcalToken?'style="opacity:0.2"':''}>📅</button>
  </div>`;
}

// ============ BIND ============
function bind(){
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{V=b.dataset.view;SP=null;render()}));
  document.getElementById('fsbtn')?.addEventListener('click',toggleFS);
  document.getElementById('resetbtn')?.addEventListener('click',resetAll);
  document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{F=b.dataset.filter;render()}));
  document.querySelectorAll('[data-pfilter]').forEach(b=>b.addEventListener('click',()=>{const v=b.dataset.pfilter;PF=v==='all'?null:v==='none'?'':v;render()}));
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',e=>{
      const a=el.dataset.action,id=el.dataset.id;
      switch(a){
        case'cycle':e.stopPropagation();cycleStatus(id);break;
        case'edit':showEdit(id);break;
        case'add-task':showAdd(null,null);break;
        case'add-task-project':showAdd(id,null);break;
        case'add-task-sp':showAdd(el.dataset.pid,el.dataset.spid);break;
        case'add-project':showAddProj();break;
        case'add-sp':showAddSP(id);break;
        case'open-project':SP=id;V='projects';render();break;
        case'back':SP=null;render();break;
        case'delete-project':if(confirm('Project en alle taken verwijderen?'))removeProject(id);break;
        case'edit-project':showEditProject(id);break;
        case'move-sp-up':moveSP(id,-1);break;
        case'move-sp-down':moveSP(id,1);break;
        case'delete-sp':if(confirm('Subproject verwijderen? Taken worden losgekoppeld.'))removeSubproject(id);break;
        case'toggle-sp':collapsed[id]=!collapsed[id];render();break;
        case'gcal-connect':gcalConnect();break;
        case'gcal-disconnect':gcalToken=null;render();break;
        case'gcal-add':e.stopPropagation();{const t=findTask(id);if(t)gcalCreateEvent(t);}break;
        case'gcal-sync-all':gcalCreateAll(tasks);break;
      }
    });
  });
  // Plan view tabs
  document.querySelectorAll('[data-pv]').forEach(b=>b.addEventListener('click',()=>{PV=b.dataset.pv;planDate=new Date();render()}));
  // Plan navigation
  document.querySelectorAll('[data-action="plan-prev"]').forEach(b=>b.addEventListener('click',()=>{
    if(PV==='week')planDate.setDate(planDate.getDate()-7);
    else if(PV==='month')planDate.setMonth(planDate.getMonth()-1);
    render();
  }));
  document.querySelectorAll('[data-action="plan-next"]').forEach(b=>b.addEventListener('click',()=>{
    if(PV==='week')planDate.setDate(planDate.getDate()+7);
    else if(PV==='month')planDate.setMonth(planDate.getMonth()+1);
    render();
  }));
  document.querySelectorAll('[data-action="plan-today"]').forEach(b=>b.addEventListener('click',()=>{planDate=new Date();render()}));
  document.querySelectorAll('.tc').forEach(c=>{
    c.addEventListener('click',e=>{if(!e.target.closest('.status-btn'))showEdit(c.dataset.id)});
    c.addEventListener('dragstart',onDS);c.addEventListener('dragend',onDE);
  });
  document.querySelectorAll('.kcol').forEach(c=>{c.addEventListener('dragover',onDO);c.addEventListener('dragleave',onDL);c.addEventListener('drop',onDR)});
}

dbLoad();
</script>
