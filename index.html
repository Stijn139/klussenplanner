<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klussenplanner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(170deg,#1a1a2e 0%,#16213e 40%,#1a1a2e 100%);color:#E8E4DF;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

.header{padding:28px 32px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;background:linear-gradient(135deg,#F0C27F,#D4763C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.subtitle{margin-top:4px;font-size:13px;color:#8B8A8A;font-weight:300}
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:8px;vertical-align:middle;transition:background 0.3s}
.sync-dot.ok{background:#6BA368}
.sync-dot.loading{background:#E8A94A;animation:pulse 1s infinite}
.sync-dot.error{background:#E85D4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pbar{display:inline-block;margin-left:12px;width:100px;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);position:relative;vertical-align:middle}
.pfill{position:absolute;left:0;top:0;height:4px;border-radius:2px;background:linear-gradient(90deg,#D4763C,#F0C27F);transition:width 0.4s}

.nav-btns{display:flex;gap:6px;align-items:center}
.nav-btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(255,255,255,0.04);color:#8B8A8A;transition:all 0.2s}
.nav-btn.active{background:rgba(212,118,60,0.2);color:#F0C27F}
.fs-btn{padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-size:16px;font-family:inherit;background:rgba(255,255,255,0.04);color:#8B8A8A;margin-left:4px;transition:all 0.2s}
.fs-btn:hover,.nav-btn:hover{background:rgba(255,255,255,0.08)}

.main{padding:24px 32px;max-width:1100px;margin:0 auto}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.filter-btns{display:flex;gap:6px}
.fbtn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit;background:transparent;color:#666;transition:all 0.15s}
.fbtn.active{background:rgba(255,255,255,0.1);color:#E8E4DF}
.btn-p{padding:7px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:linear-gradient(135deg,#D4763C,#E8A94A);color:#1a1a2e;transition:transform 0.15s}
.btn-p:hover{transform:scale(1.02)}
.btn-cal{padding:7px 16px;border-radius:8px;border:1px solid rgba(91,123,178,0.3);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(91,123,178,0.08);color:#7BA3D4;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s}
.btn-cal:hover{background:rgba(91,123,178,0.15)}

.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:768px){.kanban{grid-template-columns:1fr}}
.kcol{background:rgba(255,255,255,0.02);border-radius:14px;padding:16px;min-height:200px;border:1px solid rgba(255,255,255,0.04);transition:all 0.2s}
.kcol.drag-over{border-color:rgba(240,194,127,0.4);background:rgba(212,118,60,0.05)}
.ch{display:flex;align-items:center;gap:8px;margin-bottom:14px}

.tc{padding:12px 14px;margin-bottom:8px;border-radius:10px;cursor:grab;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);transition:all 0.2s;user-select:none}
.tc:hover{background:rgba(255,255,255,0.06)}
.tc.done-card{opacity:0.5}
.tc.dragging{opacity:0.4;transform:scale(0.95)}
.tc-inner{display:flex;align-items:flex-start;gap:10px}
.status-btn{background:none;border:none;cursor:pointer;padding:4px;font-size:16px;line-height:1;transition:transform 0.15s;border-radius:4px}
.status-btn:hover{transform:scale(1.3);background:rgba(255,255,255,0.08)}
.tc-title{font-size:13px;font-weight:500}
.tc-title.done-text{text-decoration:line-through;color:#777}
.tc-meta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.prio-tag{font-size:10px;padding:1px 7px;border-radius:4px}
.date-tag{font-size:10px;color:#666}
.date-tag.overdue{color:#E85D4A}

.stitle{font-family:'Playfair Display',serif;font-weight:700;color:#D4C4B0}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.pcard{background:rgba(255,255,255,0.03);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.pcard:hover{filter:brightness(1.1)}
.pacc{width:4px;height:100%;position:absolute;left:0;top:0;border-radius:14px 0 0 14px}
.addcard{background:rgba(255,255,255,0.02);border-radius:14px;padding:20px;border:1px dashed rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;font-size:14px;min-height:100px;transition:all 0.2s}
.addcard:hover{border-color:rgba(255,255,255,0.2)}

.trow{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04);margin-bottom:8px;transition:all 0.2s}
.trow:hover{background:rgba(255,255,255,0.04)}
.ics-btn{background:none;border:none;cursor:pointer;padding:4px 6px;font-size:14px;opacity:0.4;transition:opacity 0.2s;border-radius:4px}
.ics-btn:hover{opacity:1;background:rgba(255,255,255,0.06)}
.chip{font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,0.03);color:#888;border:1px solid rgba(255,255,255,0.05);transition:all 0.2s}
.chip:hover{background:rgba(255,255,255,0.06)}
.tag{font-size:11px;padding:3px 10px;border-radius:6px;background:rgba(255,255,255,0.04);color:#AAA;display:inline-block;margin:2px 4px 2px 0}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#1e2340;border-radius:18px;padding:28px;width:100%;max-width:440px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 60px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:20px;font-size:18px;font-family:'Playfair Display',serif;color:#D4C4B0}
.modal label{font-size:12px;color:#888;display:block;margin-bottom:6px;font-weight:500}
.mi{width:100%;padding:10px 14px;border-radius:10px;font-size:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E8E4DF;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:14px;color-scheme:dark;box-sizing:border-box}
textarea.mi{resize:vertical}
.prio-row{display:flex;gap:8px;margin-bottom:14px}
.pbtn{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;background:rgba(255,255,255,0.04);color:#666;transition:all 0.15s}
.dt-row{display:flex;gap:12px;margin-bottom:14px}
.dt-row>div{flex:1}
.colors{display:flex;gap:8px;margin-bottom:20px}
.cdot{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.cdot.act{border-color:white}
.brow{display:flex;gap:10px;margin-top:6px}
.bsave{padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;background:linear-gradient(135deg,#D4763C,#E8A94A);color:#1a1a2e;flex:1}
.bdel{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-family:inherit;background:rgba(232,93,74,0.12);color:#E85D4A}
.bcan{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-family:inherit;background:rgba(255,255,255,0.04);color:#888}
.bcal-full{width:100%;padding:10px 0;border-radius:10px;border:1px solid rgba(91,123,178,0.3);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:rgba(91,123,178,0.08);color:#7BA3D4;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
.bcal-full:hover{background:rgba(91,123,178,0.15)}
.backbtn{background:none;border:none;color:#8B8A8A;cursor:pointer;font-size:13px;font-family:inherit;padding:0;margin-bottom:16px}
.backbtn:hover{color:#E8E4DF}
.reset{background:none;border:none;color:#444;font-size:11px;cursor:pointer;font-family:inherit}
.footer{text-align:center;padding:40px 0 24px}
.proj-list-card{background:rgba(255,255,255,0.03);border-radius:14px;padding:24px;cursor:pointer;position:relative;overflow:hidden;margin-bottom:14px;transition:all 0.2s}
.btn-danger{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:inherit;background:rgba(232,93,74,0.1);color:#E85D4A}
.empty-state{text-align:center;padding:60px;color:#555}
.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;font-size:15px;color:#888;gap:10px}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><span class="sync-dot loading" style="width:10px;height:10px"></span> Laden...</div></div>
<script>
// ============ SUPABASE CONFIG ============
const SUPABASE_URL = "https://uzokzfvtwxfmdhogapzq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6b2t6ZnZ0d3hmbWRob2dhcHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTYwMDAsImV4cCI6MjA4OTQ5MjAwMH0.qUB259Hh_j4UViq8MymS5DqgPg3TYCdxjUFxj0Jd29Y";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============ CONSTANTS ============
const ST={todo:"Te doen",doing:"Bezig",done:"Klaar"};
const PR={high:"Hoog",medium:"Midden",low:"Laag"};
const PC={high:"#E85D4A",medium:"#E8A94A",low:"#6BA368"};
const SI={todo:"○",doing:"◑",done:"●"};
const SC={todo:"#8B8A8A",doing:"#E8A94A",done:"#6BA368"};
const STATUSES=["todo","doing","done"];

const DD_TASKS=[
  {id:"t1",title:"Plaatsen garderobekast",status:"todo",priority:"medium",planned:"",planned_time:"",notes:"",task_order:0,project_id:null},
  {id:"t2",title:"Openslaande taatsdeuren entree-woonkamer",status:"todo",priority:"high",planned:"",planned_time:"",notes:"",task_order:1,project_id:null},
  {id:"t3",title:"Glazen deur tweede slaapkamer",status:"todo",priority:"medium",planned:"",planned_time:"",notes:"",task_order:2,project_id:null},
  {id:"t4",title:"Ophangen gordijnen en plissé gordijnen",status:"todo",priority:"medium",planned:"",planned_time:"",notes:"",task_order:3,project_id:null},
  {id:"t5",title:"LED-strips plaatsen met Sebas",status:"todo",priority:"low",planned:"",planned_time:"",notes:"Samen met Sebas",task_order:4,project_id:null},
  {id:"t6",title:"Klapperende leiding laten oplossen door Tony",status:"todo",priority:"high",planned:"",planned_time:"",notes:"Tony inschakelen",task_order:5,project_id:null},
  {id:"t7",title:"Meubel voor draaitafels incl. boekenkast",status:"todo",priority:"medium",planned:"",planned_time:"",notes:"",task_order:6,project_id:null},
  {id:"t8",title:"Plafondlamp slaapkamer",status:"todo",priority:"low",planned:"",planned_time:"",notes:"",task_order:7,project_id:null},
  {id:"t9",title:"Plafondlamp tweede slaapkamer",status:"todo",priority:"low",planned:"",planned_time:"",notes:"",task_order:8,project_id:null}
];
const DD_PROJ_TASKS=[
  {id:"pt1",title:"Slot vervangen met Daan",status:"todo",priority:"high",planned:"",planned_time:"",notes:"Samen met Daan",task_order:0,project_id:"p1"},
  {id:"pt2",title:"Nieuwe deurbel",status:"todo",priority:"medium",planned:"",planned_time:"",notes:"",task_order:1,project_id:"p1"},
  {id:"pt3",title:"Brievenbus",status:"todo",priority:"medium",planned:"",planned_time:"",notes:"",task_order:2,project_id:"p1"},
  {id:"pt4",title:"Opnieuw schuren en beitsen",status:"todo",priority:"high",planned:"",planned_time:"",notes:"",task_order:3,project_id:"p1"},
  {id:"pt5",title:"Tochtstrips",status:"todo",priority:"low",planned:"",planned_time:"",notes:"",task_order:4,project_id:"p1"}
];
const DD_PROJECTS=[
  {id:"p1",title:"Voordeur",description:"Complete renovatie van de voordeur",color:"#D4763C"},
  {id:"p2",title:"Tuin",description:"Groot tuinproject — voorbereiding en uitvoering",color:"#4A7C59"}
];

// ============ STATE ============
let tasks=[], projects=[], V="board", SP=null, F="all", syncState="loading", idCounter=100;
let dragTaskId=null, dragProjId=null;

function uid(){idCounter++;return "id_"+Date.now()+"_"+idCounter}

// ============ SUPABASE DATA LAYER ============
async function dbLoad(){
  syncState="loading"; renderHeader();
  try{
    const [tRes,pRes] = await Promise.all([
      sb.from('tasks').select('*').order('task_order'),
      sb.from('projects').select('*')
    ]);
    if(tRes.error) throw tRes.error;
    if(pRes.error) throw pRes.error;
    tasks = tRes.data || [];
    projects = pRes.data || [];
    // Seed defaults if empty
    if(projects.length===0 && tasks.length===0){
      await seedDefaults();
    }
    syncState="ok";
  }catch(e){
    console.error("Load error:",e);
    syncState="error";
  }
  render();
}

async function seedDefaults(){
  try{
    await sb.from('projects').upsert(DD_PROJECTS);
    await sb.from('tasks').upsert([...DD_TASKS,...DD_PROJ_TASKS]);
    tasks=[...DD_TASKS,...DD_PROJ_TASKS];
    projects=[...DD_PROJECTS];
  }catch(e){console.error("Seed error:",e)}
}

async function dbSaveTask(t){
  syncState="loading"; renderHeader();
  try{
    const{error}=await sb.from('tasks').upsert(t);
    if(error)throw error;
    syncState="ok";
  }catch(e){console.error("Save task error:",e);syncState="error"}
  renderHeader();
}

async function dbDeleteTask(id){
  syncState="loading"; renderHeader();
  try{
    const{error}=await sb.from('tasks').delete().eq('id',id);
    if(error)throw error;
    syncState="ok";
  }catch(e){console.error("Delete task error:",e);syncState="error"}
  renderHeader();
}

async function dbSaveProject(p){
  syncState="loading"; renderHeader();
  try{
    const{error}=await sb.from('projects').upsert(p);
    if(error)throw error;
    syncState="ok";
  }catch(e){console.error("Save project error:",e);syncState="error"}
  renderHeader();
}

async function dbDeleteProject(id){
  syncState="loading"; renderHeader();
  try{
    await sb.from('tasks').delete().eq('project_id',id);
    await sb.from('projects').delete().eq('id',id);
    syncState="ok";
  }catch(e){console.error("Delete project error:",e);syncState="error"}
  renderHeader();
}

// ============ HELPERS ============
function fd(d){if(!d)return"";return new Date(d+"T00:00:00").toLocaleDateString("nl-NL",{day:"numeric",month:"short",year:"numeric"})}
function ov(d){return d?new Date(d+"T00:00:00")<new Date(new Date().toDateString()):false}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function looseTasks(){return tasks.filter(t=>!t.project_id)}
function projTasks(pid){return tasks.filter(t=>t.project_id===pid)}
function findTask(id){return tasks.find(t=>t.id===id)}
function allFlat(){return tasks.map(t=>{const p=t.project_id?projects.find(x=>x.id===t.project_id):null;return{...t,pT:p?.title||null,pC:p?.color||null}})}

// ============ ACTIONS ============
async function cycleStatus(id){
  const t=findTask(id);if(!t)return;
  t.status=STATUSES[(STATUSES.indexOf(t.status)+1)%3];
  render(); await dbSaveTask(t);
}

async function moveTask(id,newStatus){
  const t=findTask(id);if(!t)return;
  t.status=newStatus;
  render(); await dbSaveTask(t);
}

async function saveTask(id,updates){
  const t=findTask(id);if(!t)return;
  Object.assign(t,updates);
  render(); await dbSaveTask(t);
}

async function addTask(data){
  tasks.push(data);
  render(); await dbSaveTask(data);
}

async function removeTask(id){
  tasks=tasks.filter(t=>t.id!==id);
  render(); await dbDeleteTask(id);
}

async function addProject(data){
  projects.push(data);
  render(); await dbSaveProject(data);
}

async function removeProject(id){
  tasks=tasks.filter(t=>t.project_id!==id);
  projects=projects.filter(p=>p.id!==id);
  SP=null; render(); await dbDeleteProject(id);
}

async function resetAll(){
  if(!confirm('Alles resetten naar beginstand?'))return;
  syncState="loading";render();
  try{
    await sb.from('tasks').delete().neq('id','___none___');
    await sb.from('projects').delete().neq('id','___none___');
    await seedDefaults();
    V="board";SP=null;F="all";syncState="ok";
  }catch(e){syncState="error";console.error(e)}
  render();
}

// ============ DRAG & DROP ============
function onDragStart(e){
  const card=e.target.closest('.tc');if(!card)return;
  dragTaskId=card.dataset.id;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',dragTaskId);
}
function onDragEnd(e){
  const card=e.target.closest('.tc');if(card)card.classList.remove('dragging');
  document.querySelectorAll('.kcol').forEach(c=>c.classList.remove('drag-over'));
  dragTaskId=null;
}
function onDragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const col=e.target.closest('.kcol');if(col)col.classList.add('drag-over');
}
function onDragLeave(e){
  const col=e.target.closest('.kcol');
  if(col&&!col.contains(e.relatedTarget))col.classList.remove('drag-over');
}
function onDrop(e){
  e.preventDefault();
  const col=e.target.closest('.kcol');if(!col||!dragTaskId)return;
  col.classList.remove('drag-over');
  moveTask(dragTaskId,col.dataset.status);
}

// ============ ICS ============
function mkICS(list){
  const p2=n=>String(n).padStart(2,'0');const toD=d=>d.replace(/-/g,'');
  const nxt=d=>{const dt=new Date(d+"T00:00:00");dt.setDate(dt.getDate()+1);return dt.getFullYear()+p2(dt.getMonth()+1)+p2(dt.getDate())};
  let s="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Klussenplanner//NL\r\nCALSCALE:GREGORIAN\r\n";
  list.forEach(t=>{
    if(!t.planned)return;s+="BEGIN:VEVENT\r\n";
    if(t.planned_time){const[h,m]=t.planned_time.split(':').map(Number);s+="DTSTART;TZID=Europe/Amsterdam:"+toD(t.planned)+"T"+p2(h)+p2(m)+"00\r\n";s+="DTEND;TZID=Europe/Amsterdam:"+toD(t.planned)+"T"+p2(h+1)+p2(m)+"00\r\n"}
    else{s+="DTSTART;VALUE=DATE:"+toD(t.planned)+"\r\n";s+="DTEND;VALUE=DATE:"+nxt(t.planned)+"\r\n"}
    s+="SUMMARY:🔨 "+t.title.replace(/[,;\\]/g,' ')+"\r\n";
    if(t.notes)s+="DESCRIPTION:"+t.notes.replace(/\n/g,'\\n').replace(/[,;\\]/g,' ')+"\r\n";
    s+="UID:"+t.id+"@klussenplanner\r\nEND:VEVENT\r\n";
  });
  return s+"END:VCALENDAR\r\n";
}
function dlICS(list){
  const pl=list.filter(t=>t.planned&&t.status!=="done");
  if(!pl.length){alert("Geen geplande klussen.");return}
  const b=new Blob([mkICS(pl)],{type:"text/calendar"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="klussenplanner.ics";a.click()
}
function dlOne(id){
  const t=findTask(id);if(!t||!t.planned)return;
  const b=new Blob([mkICS([t])],{type:"text/calendar"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=t.title.replace(/[^a-zA-Z0-9]/g,'_')+".ics";a.click()
}
function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()}

// ============ MODALS ============
function showM(html){
  const bg=document.createElement("div");bg.className="mbg";
  bg.innerHTML='<div class="modal">'+html+'</div>';
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()});
  document.body.appendChild(bg);
  setTimeout(()=>{const f=bg.querySelector("input:not([type=date]):not([type=time]),textarea");if(f)f.focus()},50);
  return bg;
}
function closeM(){document.querySelector(".mbg")?.remove()}

function showEdit(id){
  const t=findTask(id);if(!t)return;
  const bg=showM(`<h3>Klus bewerken</h3>
    <label>Titel</label><input class="mi" id="et" value="${esc(t.title)}">
    <label>Prioriteit</label>
    <div class="prio-row" id="eprio">${Object.entries(PR).map(([k,v])=>`<button class="pbtn" data-p="${k}" style="background:${t.priority===k?PC[k]+'22':'rgba(255,255,255,0.04)'};color:${t.priority===k?PC[k]:'#666'}">${v}</button>`).join("")}</div>
    <div class="dt-row"><div><label>Datum</label><input type="date" class="mi" id="ed" value="${t.planned||''}"></div>
    <div><label>Tijdstip</label><input type="time" class="mi" id="etm" value="${t.planned_time||''}"></div></div>
    <label>Notities</label><textarea class="mi" id="en" rows="3">${esc(t.notes||'')}</textarea>
    <div id="ecr" style="${t.planned?'':'display:none'}"><button class="bcal-full" id="ecb">📅 Download .ics voor Google Agenda</button></div>
    <div class="brow"><button class="bsave" id="es">Opslaan</button><button class="bdel" id="edl">Verwijder</button><button class="bcan" id="ec">Annuleer</button></div>`);
  let pr=t.priority;
  bg.querySelector('#eprio').addEventListener('click',e=>{const btn=e.target.closest('.pbtn');if(!btn)return;pr=btn.dataset.p;bg.querySelectorAll('.pbtn').forEach(b=>{const k=b.dataset.p;b.style.background=k===pr?PC[k]+'22':'rgba(255,255,255,0.04)';b.style.color=k===pr?PC[k]:'#666'})});
  bg.querySelector('#ed').addEventListener('change',function(){bg.querySelector('#ecr').style.display=this.value?'':'none'});
  bg.querySelector('#ecb').addEventListener('click',()=>{saveTask(id,{title:bg.querySelector('#et').value,priority:pr,planned:bg.querySelector('#ed').value,planned_time:bg.querySelector('#etm').value,notes:bg.querySelector('#en').value});dlOne(id)});
  bg.querySelector('#es').addEventListener('click',()=>{saveTask(id,{title:bg.querySelector('#et').value,priority:pr,planned:bg.querySelector('#ed').value,planned_time:bg.querySelector('#etm').value,notes:bg.querySelector('#en').value});closeM()});
  bg.querySelector('#edl').addEventListener('click',()=>{if(!confirm('Verwijderen?'))return;removeTask(id);closeM()});
  bg.querySelector('#ec').addEventListener('click',closeM);
}

function showAdd(pid){
  const bg=showM(`<h3>${pid?'Projecttaak toevoegen':'Nieuwe klus'}</h3>
    <label>Titel</label><input class="mi" id="at" placeholder="Wat moet er gebeuren?">
    <label>Prioriteit</label><div class="prio-row" id="aprio">${Object.entries(PR).map(([k,v])=>`<button class="pbtn" data-p="${k}" style="background:${k==='medium'?PC.medium+'22':'rgba(255,255,255,0.04)'};color:${k==='medium'?PC.medium:'#666'}">${v}</button>`).join("")}</div>
    <div class="dt-row"><div><label>Datum</label><input type="date" class="mi" id="ad"></div><div><label>Tijdstip</label><input type="time" class="mi" id="atm"></div></div>
    <label>Notities</label><textarea class="mi" id="an" rows="2" placeholder="Bijv. wie helpt mee..."></textarea>
    <div class="brow"><button class="bsave" id="as">Toevoegen</button><button class="bcan" id="ac">Annuleer</button></div>`);
  let pr="medium";
  bg.querySelector('#aprio').addEventListener('click',e=>{const btn=e.target.closest('.pbtn');if(!btn)return;pr=btn.dataset.p;bg.querySelectorAll('.pbtn').forEach(b=>{const k=b.dataset.p;b.style.background=k===pr?PC[k]+'22':'rgba(255,255,255,0.04)';b.style.color=k===pr?PC[k]:'#666'})});
  bg.querySelector('#as').addEventListener('click',()=>{const ti=bg.querySelector('#at').value.trim();if(!ti)return;addTask({id:uid(),title:ti,status:"todo",priority:pr,planned:bg.querySelector('#ad').value,planned_time:bg.querySelector('#atm').value,notes:bg.querySelector('#an').value,task_order:tasks.length,project_id:pid||null});closeM()});
  bg.querySelector('#ac').addEventListener('click',closeM);
}

function showAddProj(){
  const cl=["#D4763C","#4A7C59","#5B7BB2","#9B5BA5","#C75B7A","#7BA3A3","#B8860B"];
  const bg=showM(`<h3>Nieuw project</h3><label>Naam</label><input class="mi" id="pt" placeholder="Bijv. Tuin, Badkamer...">
    <label>Beschrijving</label><textarea class="mi" id="pd" rows="2" placeholder="Kort overzicht"></textarea>
    <label>Kleur</label><div class="colors" id="pcols">${cl.map((c,i)=>`<div class="cdot${i===2?' act':''}" data-c="${c}" style="background:${c}"></div>`).join("")}</div>
    <div class="brow"><button class="bsave" id="ps">Aanmaken</button><button class="bcan" id="pc">Annuleer</button></div>`);
  let co=cl[2];
  bg.querySelector('#pcols').addEventListener('click',e=>{const d=e.target.closest('.cdot');if(!d)return;co=d.dataset.c;bg.querySelectorAll('.cdot').forEach(x=>x.classList.toggle('act',x.dataset.c===co))});
  bg.querySelector('#ps').addEventListener('click',()=>{const ti=bg.querySelector('#pt').value.trim();if(!ti)return;addProject({id:uid(),title:ti,description:bg.querySelector('#pd').value,color:co});closeM()});
  bg.querySelector('#pc').addEventListener('click',closeM);
}

// ============ RENDER ============
function renderHeader(){
  const dot=document.querySelector('.sync-dot');
  if(dot){dot.className='sync-dot '+syncState}
}

function render(){
  const all=allFlat(),dc=all.filter(t=>t.status==="done").length,pct=all.length?(dc/all.length)*100:0;
  let h=`<div class="header"><div><h1>Klussenplanner</h1>
    <p class="subtitle">${dc} / ${all.length} klaar <span class="pbar"><span class="pfill" style="width:${pct}%"></span></span>
    <span class="sync-dot ${syncState}" title="${syncState==='ok'?'Gesynchroniseerd':syncState==='loading'?'Synchroniseren...':'Synchronisatiefout'}"></span></p></div>
    <div class="nav-btns">
      <button class="nav-btn ${V==='board'?'active':''}" data-view="board">Overzicht</button>
      <button class="nav-btn ${V==='projects'?'active':''}" data-view="projects">Projecten</button>
      <button class="nav-btn ${V==='timeline'?'active':''}" data-view="timeline">Planning</button>
      <button class="fs-btn" id="fsbtn" title="Fullscreen">⛶</button>
    </div></div><div class="main">`;
  if(V==="board"&&!SP)h+=rBoard()+rProjCards();
  else if(V==="projects"&&SP)h+=rProjDet();
  else if(V==="projects"&&!SP)h+=rProjList();
  else if(V==="timeline")h+=rTimeline();
  h+=`</div><div class="footer"><button class="reset" id="resetbtn">Reset naar beginstand</button></div>`;
  document.getElementById("app").innerHTML=h;
  bind();
}

function rCard(t){
  const dn=t.status==="done";
  return`<div class="tc${dn?' done-card':''}" draggable="true" data-id="${t.id}"><div class="tc-inner">
    <button class="status-btn" data-action="cycle" data-id="${t.id}" style="color:${SC[t.status]}">${SI[t.status]}</button>
    <div style="flex:1"><span class="tc-title${dn?' done-text':''}">${esc(t.title)}</span>
    <div class="tc-meta"><span class="prio-tag" style="background:${PC[t.priority]}15;color:${PC[t.priority]}">${PR[t.priority]}</span>
    ${t.planned?`<span class="date-tag${ov(t.planned)&&!dn?' overdue':''}">${fd(t.planned)}${t.planned_time?' '+t.planned_time:''}</span>`:''}
    ${t.notes?'<span style="font-size:10px;color:#555">📝</span>':''}</div></div></div></div>`;
}

function rBoard(){
  const ts=F==="all"?looseTasks():looseTasks().filter(t=>t.priority===F);
  let h=`<div class="toolbar"><div class="filter-btns">${["all","high","medium","low"].map(f=>`<button class="fbtn${F===f?' active':''}" data-filter="${f}" ${F===f&&f!=="all"?`style="background:${PC[f]}22;color:${PC[f]}"`:``}>${f==="all"?"Alle":PR[f]}</button>`).join("")}</div>
  <button class="btn-p" data-action="add-task">+ Nieuwe klus</button></div><div class="kanban">`;
  for(const[k,l]of Object.entries(ST)){const c=ts.filter(t=>t.status===k).sort((a,b)=>(a.task_order||0)-(b.task_order||0));
    h+=`<div class="kcol" data-status="${k}"><div class="ch"><span style="font-size:16px;color:${SC[k]}">${SI[k]}</span><span style="font-size:13px;font-weight:600;color:#AAA;text-transform:uppercase;letter-spacing:0.5px">${l}</span><span style="font-size:11px;color:#555;margin-left:auto">${c.length}</span></div>${c.map(t=>rCard(t)).join("")}</div>`}
  return h+'</div>';
}

function rProjCards(){
  let h=`<h2 class="stitle" style="font-size:20px;margin-top:36px;margin-bottom:14px">Projecten</h2><div class="pgrid">`;
  projects.forEach(p=>{const pt=projTasks(p.id),d=pt.filter(t=>t.status==="done").length,tt=pt.length,pc=tt?(d/tt)*100:0;
    h+=`<div class="pcard" style="border:1px solid ${p.color}33" data-action="open-project" data-id="${p.id}"><div class="pacc" style="background:${p.color}"></div><h3 style="margin:0;font-size:16px;font-weight:600;color:${p.color}">${esc(p.title)}</h3><p style="margin:6px 0 0;font-size:12px;color:#777">${esc(p.description)}</p><div style="margin-top:12px;display:flex;align-items:center;gap:8px"><div style="flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px"><div style="height:3px;border-radius:2px;background:${p.color};width:${pc}%"></div></div><span style="font-size:11px;color:#666">${d}/${tt}</span></div></div>`});
  return h+`<div class="addcard" data-action="add-project">+ Nieuw project</div></div>`;
}

function rProjDet(){
  const p=projects.find(x=>x.id===SP);if(!p)return"";const pt=projTasks(p.id);
  let h=`<button class="backbtn" data-action="back">← Terug</button><div style="display:flex;align-items:center;gap:16px;margin-bottom:24px"><div style="width:6px;height:40px;border-radius:3px;background:${p.color}"></div><div><h2 class="stitle" style="font-size:24px;color:${p.color}">${esc(p.title)}</h2><p style="margin:4px 0 0;font-size:13px;color:#777">${esc(p.description)}</p></div><button class="btn-danger" style="margin-left:auto" data-action="delete-project" data-id="${p.id}">Verwijder</button></div><div class="kanban">`;
  for(const[k,l]of Object.entries(ST)){const c=pt.filter(t=>t.status===k);
    h+=`<div class="kcol" data-status="${k}"><div class="ch"><span style="font-size:16px;color:${SC[k]}">${SI[k]}</span><span style="font-size:13px;font-weight:600;color:#AAA;text-transform:uppercase;letter-spacing:0.5px">${l}</span><span style="font-size:11px;color:#555;margin-left:auto">${c.length}</span></div>${c.map(t=>rCard(t)).join("")}</div>`}
  return h+`</div><button class="btn-cal" style="margin-top:16px;border-color:${p.color}44;background:${p.color}11;color:${p.color}" data-action="add-task-project" data-id="${p.id}">+ Taak toevoegen</button>`;
}

function rProjList(){
  let h=`<div class="toolbar"><h2 class="stitle" style="font-size:22px">Projecten</h2><button class="btn-p" data-action="add-project">+ Nieuw project</button></div>`;
  projects.forEach(p=>{const pt=projTasks(p.id),d=pt.filter(t=>t.status==="done").length,tt=pt.length;
    h+=`<div class="proj-list-card" style="border:1px solid ${p.color}33" data-action="open-project" data-id="${p.id}"><div class="pacc" style="background:${p.color}"></div><div style="display:flex;justify-content:space-between"><div><h3 style="margin:0;font-size:18px;font-weight:600;color:${p.color}">${esc(p.title)}</h3><p style="margin:6px 0 0;font-size:13px;color:#777">${esc(p.description)}</p></div><span style="font-size:13px;color:#666">${d}/${tt} klaar</span></div><div style="margin-top:16px">${pt.filter(t=>t.status!=="done").slice(0,5).map(t=>`<span class="tag">${esc(t.title)}</span>`).join("")}</div></div>`});
  return h;
}

function rTimeline(){
  const all=allFlat();
  const pl=all.filter(t=>t.planned&&t.status!=="done").sort((a,b)=>a.planned===b.planned?(a.planned_time||"99:99").localeCompare(b.planned_time||"99:99"):a.planned.localeCompare(b.planned));
  const unp=all.filter(t=>!t.planned&&t.status!=="done");
  let h=`<div class="toolbar"><h2 class="stitle" style="font-size:22px">Planning</h2>${pl.length?`<button class="btn-cal" data-action="export-all">📅 Exporteer alles (.ics)</button>`:''}</div>`;
  if(!pl.length)h+=`<div class="empty-state"><p style="font-size:15px">Nog geen klussen ingepland</p><p style="font-size:12px;color:#444;margin-top:8px">Klik op een klus en vul een datum in</p></div>`;
  else pl.forEach(t=>{h+=`<div class="trow"><div style="min-width:110px"><span style="font-size:12px;font-weight:600;color:${ov(t.planned)?'#E85D4A':'#8B8A8A'}">${fd(t.planned)}</span>${t.planned_time?`<span style="font-size:11px;color:#7BA3D4;margin-left:6px">${t.planned_time}</span>`:''}</div><span style="width:3px;height:24px;border-radius:2px;background:${t.pC||PC[t.priority]}"></span><div style="flex:1"><span style="font-size:14px">${esc(t.title)}</span>${t.pT?`<span style="font-size:11px;color:${t.pC};margin-left:8px">${esc(t.pT)}</span>`:''}</div><span class="prio-tag" style="background:${PC[t.priority]}18;color:${PC[t.priority]}">${PR[t.priority]}</span><span style="font-size:14px;color:${SC[t.status]}">${SI[t.status]}</span><button class="ics-btn" data-action="export-one" data-id="${t.id}" title="Download .ics">📅</button></div>`});
  if(unp.length)h+=`<div style="margin-top:24px"><h3 style="font-size:14px;color:#666;font-weight:500;margin-bottom:12px">Nog niet ingepland</h3><div style="display:flex;flex-wrap:wrap;gap:8px">${unp.map(t=>`<span class="chip" data-action="edit" data-id="${t.id}">${esc(t.title)}</span>`).join("")}</div></div>`;
  return h;
}

// ============ EVENT BINDING ============
function bind(){
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{V=b.dataset.view;SP=null;render()}));
  document.getElementById('fsbtn')?.addEventListener('click',toggleFS);
  document.getElementById('resetbtn')?.addEventListener('click',resetAll);
  document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{F=b.dataset.filter;render()}));
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',e=>{
      const a=el.dataset.action,id=el.dataset.id;
      switch(a){
        case'cycle':e.stopPropagation();cycleStatus(id);break;
        case'edit':showEdit(id);break;
        case'add-task':showAdd(null);break;
        case'add-task-project':showAdd(id);break;
        case'add-project':showAddProj();break;
        case'open-project':SP=id;V='projects';render();break;
        case'back':SP=null;render();break;
        case'delete-project':removeProject(id);break;
        case'export-all':dlICS(tasks);break;
        case'export-one':dlOne(id);break;
      }
    });
  });
  document.querySelectorAll('.tc').forEach(c=>{
    c.addEventListener('click',e=>{if(!e.target.closest('.status-btn'))showEdit(c.dataset.id)});
    c.addEventListener('dragstart',onDragStart);c.addEventListener('dragend',onDragEnd);
  });
  document.querySelectorAll('.kcol').forEach(c=>{
    c.addEventListener('dragover',onDragOver);c.addEventListener('dragleave',onDragLeave);c.addEventListener('drop',onDrop);
  });
}

// ============ INIT ============
dbLoad();
</script>
